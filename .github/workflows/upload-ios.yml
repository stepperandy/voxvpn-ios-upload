name: Upload IPA to App Store Connect

on:
  workflow_dispatch:

jobs:
  upload:
    name: Upload signed IPA
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Locate IPA
        shell: bash
        run: |
          IPA_PATH="$(find "$GITHUB_WORKSPACE" -type f -name "*.ipa" | head -n 1)"

          if [ -z "$IPA_PATH" ]; then
            echo "No IPA file was found in the repository."
            exit 1
          fi

          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"
          echo "Found IPA: $IPA_PATH"

      - name: Install App Store Connect API key
        shell: bash
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
        run: |
          if [ -z "$APPSTORE_KEY_ID" ]; then
            echo "APPSTORE_KEY_ID secret is missing."
            exit 1
          fi

          if [ -z "$APPSTORE_PRIVATE_KEY" ]; then
            echo "APPSTORE_PRIVATE_KEY secret is missing."
            exit 1
          fi

          mkdir -p "$HOME/.appstoreconnect/private_keys"

          printf '%s' "$APPSTORE_PRIVATE_KEY" \
            > "$HOME/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8"

          chmod 600 \
            "$HOME/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8"

      - name: Validate credentials
        shell: bash
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          if [ -z "$APPSTORE_ISSUER_ID" ]; then
            echo "APPSTORE_ISSUER_ID secret is missing."
            exit 1
          fi

          echo "Key ID and Issuer ID are available."

      - name: Upload IPA to App Store Connect
        shell: bash
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APPSTORE_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID"
